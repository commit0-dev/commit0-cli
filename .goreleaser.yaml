# GoReleaser v2 configuration
# https://goreleaser.com/customization/
#
# Pure Go — CGO_ENABLED=0 throughout. No cross-compiler or osxcross needed;
# the Go toolchain handles all targets natively.
version: 2

project_name: commit0-cli

before:
  hooks:
    - go mod tidy

# ── Binaries ─────────────────────────────────────────────────────────────────
builds:
  - id: commit0-cli
    main: .
    binary: commit0-cli
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}

# ── Archives ──────────────────────────────────────────────────────────────────
archives:
  - id: default
    name_template: "commit0-cli_{{.Version}}_{{.Os}}_{{.Arch}}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md

# ── Checksum ──────────────────────────────────────────────────────────────────
checksum:
  name_template: "commit0-cli_{{.Version}}_checksums.txt"
  algorithm: sha256

# ── Changelog ─────────────────────────────────────────────────────────────────
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Other
      order: 999

# ── GitHub Release ────────────────────────────────────────────────────────────
release:
  github:
    owner: commit0-dev
    name: commit0-cli
  draft: false
  prerelease: auto
  footer: |
    ## Installation

    **macOS / Linux (Homebrew)**
    ```sh
    # coming soon
    ```

    **Direct download**
    Download the archive for your platform from the assets above, extract, and
    place `commit0-cli` somewhere on your `$PATH`.

    **Platforms:** `linux/amd64` · `linux/arm64` · `darwin/amd64` · `darwin/arm64` · `windows/amd64`
