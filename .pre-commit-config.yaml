# Pre-commit hook configuration — https://pre-commit.com
#
# Install hooks:
#   make install-hooks
#
# Run manually without committing:
#   pre-commit run            # run pre-commit stage hooks on staged files
#   pre-commit run --all-files
#   pre-commit run golangci-lint --hook-stage pre-push  # run slow lints
#
# Hook stages:
#   pre-commit  Fast checks only (< 5 s). Blocks the commit.
#   pre-push    Full lint suite. Blocks the push. Mirrors CI lint job.

default_install_hook_types: [pre-commit, pre-push, commit-msg]
default_stages: [pre-commit]

repos:
  # ── Commit-attribution policy ──────────────────────────────────────────────
  # Block AI / agentic-coding attribution in commit messages and reject
  # commits authored as a bot/agent identity. Two hooks:
  #
  #   1. no-ai-attribution     (commit-msg)  — scans the message body
  #   2. author-not-bot        (pre-commit)  — validates author/committer
  #                                              identity from `git var`
  #
  # Pattern catalog:    scripts/ai_attribution_patterns.py
  # Allowlist (opt-in): .commit-msg-policy.allowlist
  # Policy source:      CLAUDE.md (sole-author rule)
  # Bypass (emergencies only): git commit --no-verify  (open follow-up Issue)
  - repo: local
    hooks:
      - id: no-ai-attribution
        name: Block AI/agentic attribution in commit messages
        language: system
        stages: [commit-msg]
        entry: scripts/check-no-ai-attribution.py
        pass_filenames: true

      - id: author-not-bot
        name: Reject commits authored as a bot/agent identity
        language: system
        stages: [pre-commit]
        entry: scripts/check-author-not-bot.py
        pass_filenames: false
        always_run: true

  # ── General file hygiene ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]   # allow custom YAML tags (e.g. GitHub Actions)
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Go: formatting (pre-commit, fast) ─────────────────────────────────────
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        entry: gofmt -l -w
        types: [go]
        # Fails if gofmt modifies any file (the modified file is then unstaged;
        # stage it again and re-commit).

      # Workspace layout — tidy each member module independently.
      - id: go-mod-tidy-server
        name: go mod tidy (server)
        language: system
        entry: bash -c "cd server && go mod tidy"
        pass_filenames: false
        files: ^server/go\.(mod|sum)$

      - id: go-mod-tidy-pkg-types
        name: go mod tidy (pkg/types)
        language: system
        entry: bash -c "cd pkg/types && go mod tidy"
        pass_filenames: false
        files: ^pkg/types/go\.(mod|sum)$

  # ── Go: vet (pre-commit, fast) ─────────────────────────────────────────────
      - id: go-vet-server
        name: go vet (server)
        language: system
        entry: bash -c "cd server && go vet ./..."
        pass_filenames: false
        files: ^server/.*\.go$

      - id: go-vet-pkg-types
        name: go vet (pkg/types)
        language: system
        entry: bash -c "cd pkg/types && go vet ./..."
        pass_filenames: false
        files: ^pkg/types/.*\.go$

  # ── Go: full lint suite (pre-push, mirrors CI) ────────────────────────────
  # golangci-lint must be installed: https://golangci-lint.run/usage/install/
  #   brew install golangci-lint        # macOS
  #   go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - id: golangci-lint-server
        name: golangci-lint (server)
        language: system
        entry: bash -c "cd server && golangci-lint run --fix --timeout=5m"
        pass_filenames: false
        files: ^server/.*\.go$
        stages: [pre-push]

      - id: golangci-lint-pkg-types
        name: golangci-lint (pkg/types)
        language: system
        entry: bash -c "cd pkg/types && golangci-lint run --fix --timeout=5m"
        pass_filenames: false
        files: ^pkg/types/.*\.go$
        stages: [pre-push]
