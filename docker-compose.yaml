name: commit0

# Usage:
#   docker compose up -d              # start SurrealDB + commit0 server
#   docker compose up -d --build      # rebuild server image then start
#   docker compose logs -f commit0    # tail server logs
#
# Copy .env.example to .env and set provider keys before starting.

services:

  # ── SurrealDB 3.0 ─────────────────────────────────────────────────────────
  surreal:
    image: surrealdb/surrealdb:v3
    restart: unless-stopped
    user: "root"
    command: >
      start
        --bind 0.0.0.0:8000
        --user ${SURREAL_USER:-root}
        --pass ${SURREAL_PASS:-root}
        surrealkv:///data
    ports:
      - "${SURREAL_PORT:-8001}:8000"
    volumes:
      - surreal_data:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "http://localhost:8000"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── commit0 server ────────────────────────────────────────────────────────
  commit0:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
    restart: unless-stopped
    command: ["serve"]
    env_file:
      - path: .env
        required: false
    environment:
      SURREAL_URL: ws://surreal:8000
      SURREAL_USER: ${SURREAL_USER:-root}
      SURREAL_PASS: ${SURREAL_PASS:-root}
      OLLAMA_URL: http://host.docker.internal:11434
      UNSLOTH_URL: http://host.docker.internal:8888/v1
      OLLAMA_EMBED_MODEL: qwen3-embedding:4b
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      # Bind-mount the repo root (read-only) into /workspace so the indexer can
      # see the source. POST /api/v1/index with repo_path=/workspace then walks
      # this tree. Closes #57. Read-only is sufficient because indexing only
      # reads files; outputs land in SurrealDB.
      - type: bind
        source: .
        target: /workspace
        read_only: true
    depends_on:
      surreal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/commit0", "healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Unsloth via vLLM (optional, GPU required) ──────────────────────────────
  # Usage: docker compose --profile unsloth up -d
  # Then set LLM_PROVIDER=unsloth and UNSLOTH_URL=http://unsloth:8000/v1 in commit0 env
  unsloth:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    command: >
      --model ${UNSLOTH_MODEL:-unsloth/gemma-3-4b}
      --max-model-len ${UNSLOTH_MAX_MODEL_LEN:-8192}
      --gpu-memory-utilization 0.90
      --dtype auto
    ports:
      - "${UNSLOTH_PORT:-8000}:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - unsloth

volumes:
  surreal_data:
