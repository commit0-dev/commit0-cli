# ── PR Quality Gate ────────────────────────────────────────────────────────────
# Fast feedback on every pull request. All jobs here are required status checks
# in branch protection — a failing job blocks the merge.
#
# Post-merge work (coverage publishing, snapshot builds) lives in main.yml so
# the two pipelines stay independent and easy to reason about.
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege baseline — individual jobs escalate only what they need.
permissions:
  contents: read

env:
  CGO_ENABLED: "0"   # pure Go — no tree-sitter, no CGO ever

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false   # golangci-lint-action manages its own cache

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          args: --timeout=5m

  # ── Unit tests + coverage ─────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: |
          go test -count=1 -timeout=5m \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...

      - name: Write coverage summary
        if: always()
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep -E "^total:" | awk '{print $3}' | tr -d '%')
          {
            echo "## Coverage report"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Total** | **${COVERAGE}%** |"
            echo ""
            echo "### Per-function breakdown"
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

  # ── Go vulnerability scan ─────────────────────────────────────────────────
  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
