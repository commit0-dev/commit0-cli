name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege baseline — individual jobs escalate only what they need.
permissions:
  contents: read

env:
  CGO_ENABLED: "1"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  # Uses golangci-lint with .golangci.yml — the same config and tool that
  # runs in the pre-push git hook, guaranteeing local ↔ CI parity.
  # install-mode: goinstall compiles golangci-lint with the active Go toolchain,
  # avoiding a version mismatch when go.mod targets a newer Go than the
  # pre-built binary was compiled with.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false   # golangci-lint-action manages its own cache

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          args: --timeout=5m

  # ── Unit tests + coverage ─────────────────────────────────────────────────
  # Single go test invocation: race detector on all packages, coverage
  # collected only for internal/app (adapters need live external services).
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ncruces/go-coverage-report writes to the repo Wiki
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: |
          go test -race -count=1 -timeout=5m \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/app/... \
            ./...

      - name: Enforce 99.8 % coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep -E "^total:" | awk '{print $3}' | tr -d '%')
          echo "coverage=${COVERAGE}" >> "$GITHUB_ENV"
          THRESHOLD=99.8
          if awk "BEGIN{exit !($COVERAGE < $THRESHOLD)}"; then
            echo "::error::Coverage ${COVERAGE}% is below the required ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% >= ${THRESHOLD}% ✓"

      - name: Write coverage summary
        if: always()
        run: |
          {
            echo "## Coverage report — \`internal/app\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Total** | **${coverage}%** |"
            echo "| Threshold | 99.8% |"
            echo ""
            echo "### Per-function breakdown"
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

      - name: Publish coverage report
        uses: ncruces/go-coverage-report@v0
        with:
          coverage-file: coverage.out
          report: true
          chart: true
          amend: true
        if: github.event_name == 'push'
        continue-on-error: true

  # ── GoReleaser: validate config + linux snapshot build ────────────────────
  # Validates .goreleaser.yaml and builds linux/amd64 + linux/arm64 binaries.
  # Runs on push only — PRs get lint + test feedback without the heavy build.
  goreleaser:
    name: GoReleaser snapshot
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install arm64 cross-compiler
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Validate .goreleaser.yaml
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check

      - name: Snapshot build (linux/amd64 + linux/arm64)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          # --id linux: only build the linux targets defined in .goreleaser.yaml.
          # darwin builds require osxcross (goreleaser-cross image) — run in release only.
          args: build --snapshot --clean --id linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-linux
          path: dist/
          retention-days: 3

  # ── Container image (main branch only) ───────────────────────────────────
  # Builds a multi-arch image from Dockerfile using buildx + QEMU, then
  # pushes edge + sha-<short> tags to ghcr.io.
  # Runs after the goreleaser snapshot so a broken binary blocks the push.
  image:
    name: Build & push edge image
    runs-on: ubuntu-latest
    needs: [goreleaser]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/commit0
          tags: |
            type=raw,value=edge
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=edge
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
