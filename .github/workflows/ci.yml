name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      - 'CODEOWNERS'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.commit-msg-policy.allowlist'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CGO_ENABLED: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        module: [server, pkg/types]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: false
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}
          args: -c ${{ github.workspace }}/.golangci.yml --timeout=5m

  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-22.04
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true
      - name: Test pkg/types
        working-directory: pkg/types
        run: go test -race -count=1 -timeout=2m ./...
      - name: Run server tests with coverage
        working-directory: server
        run: |
          go test -race -count=1 -timeout=5m \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/app/... \
            ./...
      - name: Enforce 96 % coverage threshold
        working-directory: server
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep -E "^total:" | awk '{print $3}' | tr -d '%')
          echo "coverage=${COVERAGE}" >> "$GITHUB_ENV"
          THRESHOLD=96
          if awk "BEGIN{exit !($COVERAGE < $THRESHOLD)}"; then
            echo "::error::Coverage ${COVERAGE}% is below the required ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% >= ${THRESHOLD}% ✓"
      - name: Write coverage summary
        if: always()
        working-directory: server
        run: |
          {
            echo "## Coverage report — \`server/internal/app\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Total** | **${coverage}%** |"
            echo "| Threshold | 96% |"
            echo ""
            echo "### Per-function breakdown"
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: server/coverage.out
          retention-days: 14

  govulncheck:
    name: Vulnerability scan
    needs: [test]
    runs-on: ubuntu-22.04
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true
      - name: Cache govulncheck binary
        id: cache-govulncheck
        uses: actions/cache@v4
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ runner.os }}-${{ hashFiles('server/go.mod') }}
      - name: Install govulncheck (cache miss)
        if: steps.cache-govulncheck.outputs.cache-hit != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        working-directory: server
        run: $(go env GOPATH)/bin/govulncheck ./...

  image-scan:
    name: Build & scan image
    needs: [test]
    runs-on: ubuntu-22.04
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: commit0:pr-${{ github.event.number }}
          build-args: |
            VERSION=pr-${{ github.event.number }}
            COMMIT=${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.build.outputs.imageid }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
