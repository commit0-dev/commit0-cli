# ── PR Quality Gate ────────────────────────────────────────────────────────────
# Fast feedback on every pull request. All jobs here are required status checks
# in branch protection — a failing job blocks the merge.
#
# Post-merge work (coverage publishing, snapshot builds, edge image push) lives
# in main.yml so the two pipelines stay independent and easy to reason about.
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege baseline — individual jobs escalate only what they need.
permissions:
  contents: read

env:
  CGO_ENABLED: "1"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  # The repo is a Go workspace (go.work) with no root module; lint each
  # member module independently. pkg/types is dependency-free types-only and
  # rarely changes; server is the primary build target.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [server, pkg/types]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: false   # golangci-lint-action manages its own cache

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: ${{ matrix.module }}
          args: --timeout=5m

  # ── Unit tests + coverage ─────────────────────────────────────────────────
  # Tests run inside the server/ module — that's where internal/app and the
  # 98% coverage gate live. pkg/types tests run separately below to keep the
  # coverage report focused on application code.
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Test pkg/types
        working-directory: pkg/types
        run: go test -race -count=1 -timeout=2m ./...

      - name: Run server tests with coverage
        working-directory: server
        run: |
          go test -race -count=1 -timeout=5m \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/app/... \
            ./...

      # Coverage floor — set below current actual (~32%) after the v0.0.2
      # monorepo split temporarily diluted the ratio. Tracked back up to the
      # original 98% target in the v0.0.2 release-blocker thread.
      - name: Enforce coverage floor
        working-directory: server
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep -E "^total:" | awk '{print $3}' | tr -d '%')
          echo "coverage=${COVERAGE}" >> "$GITHUB_ENV"
          THRESHOLD=30
          if awk "BEGIN{exit !($COVERAGE < $THRESHOLD)}"; then
            echo "::error::Coverage ${COVERAGE}% is below the floor ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% >= ${THRESHOLD}% ✓"

      - name: Write coverage summary
        if: always()
        working-directory: server
        run: |
          {
            echo "## Coverage report — \`server/internal/app\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Total** | **${coverage}%** |"
            echo "| Floor | 30% |"
            echo ""
            echo "### Per-function breakdown"
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: server/coverage.out
          retention-days: 14

  # ── Go vulnerability scan ─────────────────────────────────────────────────
  # Scans the server module — pkg/types has zero external imports by invariant.
  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true

      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: server/go.mod
          work-dir: server
          go-package: ./...

  # ── Container image scan ──────────────────────────────────────────────────
  # Builds linux/amd64 only, loads into the local daemon for trivy — no push.
  # Gated on lint + test to avoid wasting resources on a broken PR.
  image-scan:
    name: Build & scan image
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: commit0:pr-${{ github.event.number }}
          build-args: |
            VERSION=pr-${{ github.event.number }}
            COMMIT=${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.build.outputs.imageid }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
