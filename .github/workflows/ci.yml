name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "1"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false

  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test -race -count=1 -timeout=5m ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage*.out
          retention-days: 7

  # ── GoReleaser: validate config + linux snapshot build ────────────────────
  # Uses goreleaser-action on ubuntu-latest with arm64 cross-compiler.
  # Builds --id linux only (darwin requires osxcross, available only in
  # goreleaser-cross — see release.yml for the full multi-platform build).
  goreleaser:
    name: GoReleaser snapshot
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install arm64 cross-compiler
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Validate .goreleaser.yaml
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check

      - name: Snapshot build (linux/amd64 + linux/arm64)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          # --id linux: only build the linux targets defined in .goreleaser.yaml.
          # darwin builds require osxcross (goreleaser-cross image) — run in release only.
          args: build --snapshot --clean --id linux
        env:
          # Needed by goreleaser even for snapshot (changelog generation).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-linux
          path: dist/
          retention-days: 3

  # ── Container image (main branch only) ───────────────────────────────────
  # Pushes edge + sha-<short> tags to ghcr.io.
  # Container images are linux-only; ko is invoked directly here (not via
  # goreleaser) so it runs without a full release context.
  image:
    name: Build & push edge image
    runs-on: ubuntu-latest
    needs: [goreleaser]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install arm64 cross-compiler
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: ko-build/setup-ko@v0.7

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch edge image
        env:
          KO_DOCKER_REPO: ghcr.io/${{ github.repository_owner }}/commit0
          CC_linux_arm64: aarch64-linux-gnu-gcc
          VERSION: edge
          COMMIT: ${{ github.sha }}
        run: |
          ko build \
            --bare \
            --tags edge,sha-$(git rev-parse --short HEAD) \
            --platform linux/amd64,linux/arm64 \
            --image-refs image-refs.txt \
            .
          echo "Pushed:"
          cat image-refs.txt

      - name: Upload image refs
        uses: actions/upload-artifact@v4
        with:
          name: image-refs-edge
          path: image-refs.txt
          retention-days: 7
