name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege baseline — individual jobs escalate only what they need.
permissions:
  contents: read

env:
  CGO_ENABLED: "1"

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  # golangci-lint with .golangci.yml — same config as the pre-push hook,
  # guaranteeing local ↔ CI parity.
  # install-mode: goinstall avoids a version mismatch when go.mod targets a
  # newer Go than the pre-built binary was compiled with.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false   # golangci-lint-action manages its own cache

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          args: --timeout=5m

  # ── Unit tests + coverage ─────────────────────────────────────────────────
  # Race detector on all packages; coverage collected only for internal/app
  # (adapters need live external services).
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ncruces/go-coverage-report writes to the repo Wiki
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: |
          go test -race -count=1 -timeout=5m \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/app/... \
            ./...

      - name: Enforce 99.8 % coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep -E "^total:" | awk '{print $3}' | tr -d '%')
          echo "coverage=${COVERAGE}" >> "$GITHUB_ENV"
          THRESHOLD=99.8
          if awk "BEGIN{exit !($COVERAGE < $THRESHOLD)}"; then
            echo "::error::Coverage ${COVERAGE}% is below the required ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% >= ${THRESHOLD}% ✓"

      - name: Write coverage summary
        if: always()
        run: |
          {
            echo "## Coverage report — \`internal/app\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Total** | **${coverage}%** |"
            echo "| Threshold | 99.8% |"
            echo ""
            echo "### Per-function breakdown"
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

      - uses: ncruces/go-coverage-report@v0
        if: github.event_name == 'push'
        with:
          coverage-file: coverage.out
          report: true
          chart: true
          amend: true
        continue-on-error: true

  # ── Go vulnerability scan ─────────────────────────────────────────────────
  # govulncheck cross-references the module graph against the Go vuln DB.
  # Runs in parallel with lint + test so it doesn't extend the critical path.
  govulncheck:
    name: Go vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

  # ── Dependency review (PRs only) ──────────────────────────────────────────
  # Blocks PRs that introduce dependencies with known CVEs or non-permissive
  # licenses. Only runs on pull_request — push events don't need it.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          # Fail on high+ severity CVEs that have a fix available.
          fail-on-severity: high
          deny-licenses: GPL-2.0, LGPL-2.0, LGPL-2.1, AGPL-3.0
          comment-summary-in-pr: always

  # ── GoReleaser: validate config + linux snapshot ──────────────────────────
  # Validates .goreleaser.yaml and builds linux/amd64 + linux/arm64 binaries.
  # Push only — PRs get lint+test+vuln feedback without the heavy build.
  goreleaser:
    name: GoReleaser snapshot
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install arm64 cross-compiler
        run: sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu

      - name: Validate .goreleaser.yaml
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check

      - name: Snapshot build (linux/amd64 + linux/arm64)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          # --id linux: darwin requires osxcross — available only in release.yml.
          args: build --snapshot --clean --id linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-linux
          path: dist/
          retention-days: 3

  # ── Container image ──────────────────────────────────────────────────────
  # PRs:       linux/amd64 only, load to local daemon, trivy scan — no push.
  # push/main: linux/amd64 + linux/arm64, push to ghcr.io with SBOM +
  #            provenance attestations, trivy scan from registry.
  image:
    name: ${{ github.event_name == 'pull_request' && 'Build & scan image (no push)' || 'Build, push & scan edge image' }}
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write
      security-events: write   # trivy SARIF upload
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Skip login on PRs — forks don't have package write access.
      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/commit0
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}

      # PRs:  single platform + load for local trivy scan.
      # main: multi-arch + push with SBOM and SLSA provenance attestations.
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.event_name == 'pull_request' && 'pr' || 'edge' }}
            COMMIT=${{ github.sha }}
          provenance: ${{ github.event_name == 'pull_request' && 'false' || 'mode=max' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Resolve the image reference for trivy:
      #   PR   → local image ID (sha256:...) from the Docker daemon.
      #   main → registry digest reference (can be pulled by trivy).
      - name: Resolve image ref for scanning
        id: image-ref
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "value=${{ steps.build.outputs.imageid }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=ghcr.io/${{ github.repository_owner }}/commit0@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.image-ref.outputs.value }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          # Only fail on fixable CVEs — base-image unfixable vulns shouldn't
          # block unrelated PRs.
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()   # upload even when the scan step fails
        with:
          sarif_file: trivy.sarif
          category: trivy-image
