name: CLA

# Required status check on every PR — including drafts. CLA gating is a
# legal requirement and is independent of the cost-discipline filters that
# apply to ci.yml.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-22.04
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        if: |
          github.event_name == 'pull_request_target' ||
          github.event.comment.body == 'recheck' ||
          contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/${{ github.repository }}/blob/main/CLA.md
          branch: main
          allowlist: dependabot[bot],renovate[bot],github-actions[bot]
