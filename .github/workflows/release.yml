name: Release

on:
  push:
    tags:
      - "v*.*.*"

# One release at a time — a second tag push waits rather than racing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# goreleaser-cross bundles every cross-compiler needed:
#   linux/arm64  → aarch64-linux-gnu-gcc
#   darwin/amd64 → o64-clang   (osxcross)
#   darwin/arm64 → oa64-clang  (osxcross)
# Keep this tag in sync with the `go` directive in go.mod.
env:
  GORELEASER_CROSS_IMAGE: ghcr.io/goreleaser/goreleaser-cross:v1.26.0

jobs:
  # ── Binary archives + GitHub Release ─────────────────────────────────────
  # Builds linux + darwin binaries for amd64/arm64, packages tar.gz archives,
  # and creates the GitHub Release with changelog and checksums.
  release-binaries:
    name: GoReleaser release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog + tag resolution

      # Cache Go modules on the host so the goreleaser-cross container can
      # reuse them (mounted via -v below).
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Pass registry credentials via DOCKER_CONFIG env var — the idiomatic
      # way for tools like ko that read Docker credential files without
      # requiring a Docker daemon. Avoids writing credentials to the workspace.
      - name: Configure ghcr.io credentials
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$RUNNER_TEMP/.docker"
          AUTH=$(printf '%s:%s' '${{ github.actor }}' "${GITHUB_TOKEN}" | base64 -w0)
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' "${AUTH}" \
            > "$RUNNER_TEMP/.docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/.docker" >> "$GITHUB_ENV"

      # Run goreleaser inside goreleaser-cross.
      # Mounts:
      #   /workspace  → repo + dist output
      #   /root/go    → Go module cache from the host setup-go step
      #   /root/.docker → registry credentials written above
      - name: GoReleaser release
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$HOME/go:/root/go" \
            -v "$RUNNER_TEMP/.docker:/root/.docker:ro" \
            -w /workspace \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e GITHUB_REPOSITORY_OWNER="${{ github.repository_owner }}" \
            "${{ env.GORELEASER_CROSS_IMAGE }}" \
            goreleaser release --clean

  # ── Multi-arch container image ────────────────────────────────────────────
  # Builds linux/amd64 + linux/arm64 images from Dockerfile using buildx.
  # Runs after release-binaries so a broken build blocks the image push.
  # Tags: <version> (e.g. 1.2.3), <major>.<minor> (e.g. 1.2), latest.
  # "latest" is only applied to stable releases (no pre-release suffix).
  release-image:
    name: Build & push release image
    runs-on: ubuntu-latest
    needs: [release-binaries]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/commit0
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
