name: Release

on:
  push:
    tags:
      - "v*.*.*"

# One release at a time — a second tag push waits rather than racing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# goreleaser-cross bundles every cross-compiler needed:
#   linux/arm64  → aarch64-linux-gnu-gcc
#   darwin/amd64 → o64-clang   (osxcross)
#   darwin/arm64 → oa64-clang  (osxcross)
# Keep this tag in sync with the `go` directive in go.mod.
env:
  GORELEASER_CROSS_IMAGE: ghcr.io/goreleaser/goreleaser-cross:v1.26.0

jobs:
  release:
    name: GoReleaser release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release
      packages: write   # push to ghcr.io

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog + tag resolution

      # Cache Go modules on the host so the goreleaser-cross container can
      # reuse them (mounted via -v below).
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Pass registry credentials via DOCKER_CONFIG env var — the idiomatic
      # way for tools like ko that read Docker credential files without
      # requiring a Docker daemon. Avoids writing credentials to the workspace.
      - name: Configure ghcr.io credentials
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p "$RUNNER_TEMP/.docker"
          AUTH=$(printf '%s:%s' '${{ github.actor }}' "${GITHUB_TOKEN}" | base64 -w0)
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' "${AUTH}" \
            > "$RUNNER_TEMP/.docker/config.json"
          echo "DOCKER_CONFIG=$RUNNER_TEMP/.docker" >> "$GITHUB_ENV"

      # Run goreleaser inside goreleaser-cross.
      # Mounts:
      #   /workspace  → repo + dist output
      #   /root/go    → Go module cache from the host setup-go step
      #   /root/.docker → registry credentials written above
      # GITHUB_REPOSITORY_OWNER is consumed by the {{.Env.GITHUB_REPOSITORY_OWNER}}
      # template in the kos.repository field of .goreleaser.yaml.
      - name: GoReleaser release
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$HOME/go:/root/go" \
            -v "$RUNNER_TEMP/.docker:/root/.docker:ro" \
            -w /workspace \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e GITHUB_REPOSITORY_OWNER="${{ github.repository_owner }}" \
            "${{ env.GORELEASER_CROSS_IMAGE }}" \
            goreleaser release --clean
