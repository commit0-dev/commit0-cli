name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Weekly scan on Tuesday at 02:30 UTC — staggered from CodeQL.
    - cron: "30 2 * * 2"

# Scorecard needs to read branch protection and workflow configs.
permissions: read-all

jobs:
  analyze:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required by ossf/scorecard-action to post results.
      security-events: write
      # Required for keyless signing via Sigstore.
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Disable credential persistence — scorecard checks for this as a
          # security best practice.
          persist-credentials: false

      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          # Publish results to the OpenSSF API so the badge stays current.
          publish_results: true

      - uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: scorecard.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard.sarif
