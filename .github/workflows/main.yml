name: Main

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
      - 'CODEOWNERS'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.commit-msg-policy.allowlist'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CGO_ENABLED: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        module: [server, pkg/types]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: false
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}
          args: -c ${{ github.workspace }}/.golangci.yml --timeout=5m

  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true
      - name: Test pkg/types
        working-directory: pkg/types
        run: go test -race -count=1 -timeout=2m ./...
      - name: Run server tests with coverage
        working-directory: server
        run: |
          go test -race -count=1 -timeout=5m \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -coverpkg=./internal/app/... \
            ./...
      - name: Write coverage summary
        if: always()
        working-directory: server
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep -E "^total:" | awk '{print $3}' | tr -d '%')
          {
            echo "## Coverage report — \`server/internal/app\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Total** | **${COVERAGE}%** |"
            echo "| Threshold | 96% |"
            echo ""
            echo "### Per-function breakdown"
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: server/coverage.out
          retention-days: 14
      - uses: ncruces/go-coverage-report@v0
        with:
          coverage-file: server/coverage.out
          report: true
          chart: true
          amend: true
        continue-on-error: true

  govulncheck:
    name: Vulnerability scan
    needs: [test]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true
      - name: Cache govulncheck binary
        id: cache-govulncheck
        uses: actions/cache@v4
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ runner.os }}-${{ hashFiles('server/go.mod') }}
      - name: Install govulncheck (cache miss)
        if: steps.cache-govulncheck.outputs.cache-hit != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        working-directory: server
        run: $(go env GOPATH)/bin/govulncheck ./...

  goreleaser:
    name: GoReleaser snapshot
    needs: [test]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache: true
      - name: Install arm64 cross-compiler
        run: sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
      - name: Validate .goreleaser.yaml
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: check
      - name: Snapshot build
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: build --snapshot --clean --id linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-linux
          path: dist/
          retention-days: 3

  image:
    name: Build, push & scan edge image
    needs: [test]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/commit0
          tags: |
            type=raw,value=edge
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=edge
            COMMIT=${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/commit0@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy-image
