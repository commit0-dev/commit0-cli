version: 2
updates:
  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    commit-message:
      prefix: "chore(ci)"
    labels: [dependencies, github-actions]

  # ── Go modules ────────────────────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, go]
    groups:
      # Batch Google SDK bumps together — they version-lock each other.
      google:
        patterns:
          - "google.golang.org/*"
          - "cloud.google.com/*"

  # ── Dockerfile ────────────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    commit-message:
      prefix: "chore(docker)"
    labels: [dependencies, docker]
