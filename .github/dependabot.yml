version: 2
updates:
  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    commit-message:
      prefix: "chore(ci)"
    labels: [dependencies, github-actions]

  # ── Go modules ────────────────────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, go]
